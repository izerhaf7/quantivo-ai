# deploy/nginx-boa.conf — serves the built frontend + proxies API calls to
# the backend, same-origin (so CORS is a non-issue for the deployed app;
# CORS_ORIGINS in .env only matters if something calls the API directly from
# a different origin).
#
# Install:
#   sudo cp deploy/nginx-boa.conf /etc/nginx/sites-available/boa
#   sudo ln -s /etc/nginx/sites-available/boa /etc/nginx/sites-enabled/
#   sudo rm -f /etc/nginx/sites-enabled/default   # avoid the stock site clashing on :80
#   sudo nginx -t && sudo systemctl reload nginx

server {
    listen 80 default_server;
    listen [::]:80 default_server;
    # default_server kept so bare-IP requests (http://54.255.65.50) still
    # resolve too -- useful for direct debugging without going through
    # Cloudflare. Real visitors arrive via consultin.alleysa.web.id.
    server_name consultin.alleysa.web.id;

    root /var/www/boa;
    index index.html;

    # Baseline hardening -- cheap, no functional risk. HSTS is deliberately
    # NOT set: this is an IP-only demo with no TLS in front of it yet, and
    # HSTS on a plain-HTTP-only origin just breaks future http:// access.
    # style-src allows 'unsafe-inline' because the app renders many dynamic
    # widths/gradients via React's style={{...}} (progress bars, chart
    # positioning) -- those are inline style attributes, not injected
    # <script> tags, so this doesn't weaken the actual XSS defense
    # (script-src stays locked to 'self'). fonts.googleapis.com/gstatic.com
    # are explicitly allowlisted because src/styles/fonts.css @imports the
    # app's actual typefaces from there -- verified live (first version of
    # this policy silently broke font loading; caught via a Playwright
    # console-error check against the deployed site before shipping this one).
    server_tokens off;
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' data: https://fonts.gstatic.com; img-src 'self' data:; connect-src 'self'; object-src 'none'; base-uri 'self'; frame-ancestors 'none'" always;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /api/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # Analyses can take a while end to end; individual requests here are
        # just polling/CRUD though, so this only needs to comfortably cover
        # one HTTP round-trip, not a full pipeline run.
        proxy_read_timeout 60s;
    }

    location /health {
        proxy_pass http://127.0.0.1:8000;
    }
}
